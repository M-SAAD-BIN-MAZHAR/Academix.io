video_download_task:
  description: >
    Read the routing directives first.
    If selected_workflow is YOUTUBE_NOTES, use the YouTubeMediaAssistant tool to process
    this exact URL: {youtube_url}. Return a high-fidelity transcript with accurate timestamps.
    If selected_workflow is not YOUTUBE_NOTES, return SKIPPED: Not a YouTube workflow.
  expected_output: >
    A complete transcript with timestamps, or SKIPPED message for non-YouTube workflows.
  agent: YouTubeMediaAssistant

planner_agent_task:
  description: >
    Create a short execution plan based on user_input {user_input}, routing mode {task_type},
    topic {topic}, and youtube_url {youtube_url}.
    Planning objective: {planner_goal}
    The plan must include workflow selection rationale, tool execution sequence, and output format.
  expected_output: >
    A concise workflow plan with clear steps that downstream tasks can follow.
  agent: PlannerAgent

routing_decision_task:
  description: >
    Using user_input {user_input}, task_type {task_type} (AUTO mode), and the planner plan,
    produce explicit routing directives for downstream tasks.
    If user_input describes a programming task, set selected_workflow to CODE_EXECUTION.
    Return a compact routing block with selected_workflow (YOUTUBE_NOTES, GENERAL_QUERY,
    CODE_EXECUTION, NUMERICAL_METHODS, or LAB_REPORT), tools_to_use list,
    should_upload_to_notion flag, and notes_format specification.
  expected_output: >
    A deterministic routing directive with selected_workflow, tools_to_use list,
    should_upload_to_notion boolean, and notes_format string.
  agent: PlannerAgent

code_execution_task:
  description: >
    You are a senior software engineer. Your job is to write AND execute code.

    Analyze user_input: {user_input}

    If this is a programming task (CODE_EXECUTION or GENERAL_QUERY with code request):

    STEP 1 - WRITE THE CODE:
    Write complete, working, well-commented Python code that fully solves the problem.
    Rules for the code:
    - Replace any input() calls with hardcoded sample values (e.g., num_threads = 3)
    - The code must run without any user interaction
    - Include all imports
    - Add clear comments explaining each section
    - For threading/semaphore tasks, use num_threads = 3 as the default sample value

    STEP 2 - EXECUTE THE CODE:
    Use the CodeCompilerTool with the exact code you wrote and language="python".
    The tool will return the actual stdout output.

    STEP 3 - RETURN BOTH:
    Return in this exact format:

    CODE:
    ```python
    [paste your complete code here]
    ```

    OUTPUT:
    ```
    [paste the exact stdout from CodeCompilerTool here]
    ```

    If the user requests visual graphs, charts, or plots, use the DataVizTool instead
    of CodeCompilerTool. Ensure the markdown output from DataVizTool is included
    so the final report can display the images.

    If not a programming task, return: SKIPPED: No code execution required.
  expected_output: >
    The complete Python code in a fenced code block, followed by the actual execution
    output in a separate output block. Both sections must be present and populated.
  agent: CoderAgent

lab_report_generation_task:
  description: >
    Read routing directives first.
    If selected_workflow is LAB_REPORT, use LabReportGenerator tool to extract content
    from the lab manual file at {lab_manual_path}.
    Parse the extracted content to identify title, objective, theory, and procedure.
    If theory is incomplete, use search_tool to find additional information.
    Convert algorithm to Octave code and execute using OctaveOnline tool.
    Compile everything into a professional lab report.
    If selected_workflow is not LAB_REPORT, return SKIPPED: Not a lab report workflow.
  expected_output: >
    A complete professional lab report in markdown format, or SKIPPED for non-lab workflows.
  agent: LabReportGeneratorAgent

numerical_methods_task:
  description: >
    Read routing directives first.
    If selected_workflow is NUMERICAL_METHODS, solve the requested numerical problem.
    Use OctaveOnline tool to execute Octave/MATLAB code and include execution output.
    Return a lab-style report with problem statement, method, code, output, and interpretation.
    If selected_workflow is not NUMERICAL_METHODS, return SKIPPED: Not a numerical methods workflow.
  expected_output: >
    A numerical methods lab report with code and execution output, or SKIPPED message.
  agent: NumericalMethodsAgent

notes_creation_task:
  description: >
    You are a senior academic writer with 20+ years of experience producing
    doctoral-level engineering lab reports. Every word you write must pass as
    the genuine work of a meticulous, knowledgeable human student. Do not begin
    writing until all three preparatory phases are complete.

    ════════════════════════════════════════════════════════════════════════
    PHASE 1 — MANDATORY DATA EXTRACTION  (execute before anything else)
    ════════════════════════════════════════════════════════════════════════

    From the output of code_execution_task, extract and STORE these three
    variables. They will be referenced throughout every section below.

      FULL_CODE     = the complete, unmodified source code, character-perfect.
      FULL_OUTPUT   = the complete terminal/console output, byte-perfect.
      EXPERIMENT_TOPIC = the subject in 3–6 words (e.g. "POSIX semaphore
                         mutual exclusion producer consumer").

    ABORT RULE: If FULL_CODE or FULL_OUTPUT cannot be extracted, halt
    immediately and output only: "ERROR: Prerequisite data missing —
    code_execution_task did not provide [FULL_CODE / FULL_OUTPUT]."
    Never substitute a placeholder. Never fabricate output. Never proceed.

    ════════════════════════════════════════════════════════════════════════
    PHASE 2 — CITATION RETRIEVAL  (execute before writing)
    ════════════════════════════════════════════════════════════════════════

    Call CitationFinder(query=EXPERIMENT_TOPIC).
    Collect exactly 4–5 results. Store as CITATIONS[1..5].
    Each citation must be real, verifiable, and complete:
      - Author names, article/book title, journal or publisher,
        volume, issue, page range, year, DOI or ISBN.
    If fewer than 4 results return, call CitationFinder again with a
    broader 2–3 word query variant. Repeat until 4–5 are secured.
    NEVER guess, invent, or partially fill any citation field.

    ════════════════════════════════════════════════════════════════════════
    PHASE 3 — DOCUMENT ASSEMBLY
    ════════════════════════════════════════════════════════════════════════

    Read memory_context {memory_context} for student name, university,
    course code, and instructor. If any field is absent, leave the table
    cell blank — do not guess.

    ─────────────────────────────────────────────────────────────────────
    DOCUMENT HEADER
    ─────────────────────────────────────────────────────────────────────

    Output this header block verbatim, substituting each bracketed value:

    # [Full Descriptive Experiment Title — infer from EXPERIMENT_TOPIC]

    | Field        | Detail                                           |
    |:-------------|:-------------------------------------------------|
    | University   | [from memory_context]                            |
    | Department   | [from memory_context]                            |
    | Course       | [Course Name — Course Code from memory_context]  |
    | Experiment   | [Experiment Title]                               |
    | Student      | [from memory_context]                            |
    | Student ID   | [from memory_context if available]               |
    | Instructor   | [from memory_context]                            |
    | Date         | [DD Month YYYY — today]                          |

    ---

    ─────────────────────────────────────────────────────────────────────
    TABLE OF CONTENTS
    ─────────────────────────────────────────────────────────────────────

    ## Table of Contents

    1. [Objective](#1-objective)
    2. [Theory and Background](#2-theory-and-background)
    3. [Methodology](#3-methodology)
    4. [Implementation](#4-implementation)
    5. [Results and Analysis](#5-results-and-analysis)
    6. [Discussion](#6-discussion)
    7. [Conclusion](#7-conclusion)
    8. [References](#8-references)

    ---

    ══════════════════════════════════════════════════════════════════════
    SECTION 1 — OBJECTIVE
    ══════════════════════════════════════════════════════════════════════

    ## 1. Objective

    Write exactly 2–3 sentences. All three requirements below must be met
    simultaneously in these sentences:
      REQ-1: Name the specific algorithm, OS primitive, or data structure.
      REQ-2: State what was implemented and in what environment/language.
      REQ-3: Identify what behaviour or property is demonstrated/measured.

    Sentence rhythm: lead with implementation → follow with demonstration.
    BANNED openers: "The aim", "This lab", "This experiment aims",
    "The purpose", "The goal", "This report", "We aim", "This study".

    STRONG EXAMPLE (use this rhythm, not this content):
      "A bounded-buffer producer-consumer system was implemented in C using
      POSIX semaphores (`sem_wait`, `sem_post`) to enforce mutual exclusion
      and synchronise concurrent threads on Ubuntu 22.04 LTS. The experiment
      measures deadlock-free throughput under varying producer-to-consumer
      ratios and validates the theoretical semaphore invariant S >= 0."

    ---

    ══════════════════════════════════════════════════════════════════════
    SECTION 2 — THEORY AND BACKGROUND
    ══════════════════════════════════════════════════════════════════════

    ## 2. Theory and Background

    STRUCTURE: Write exactly 6 paragraphs in this order. Each paragraph
    must be 5–10 sentences. No bullet points. No sub-headings within
    this section. Pure flowing academic prose throughout.

    P1 — DEFINITION & ETYMOLOGY
      Provide a formal, precise definition. Include the etymology of the
      key term if non-trivial. Define all notation used later. Cite [N].

    P2 — INTERNAL MECHANISM
      Explain how the concept operates at the OS, hardware, or algorithmic
      level. Describe data structures, system calls, or execution steps
      involved. Be technical and specific.

    P3 — MATHEMATICAL / LOGICAL FOUNDATIONS
      Present formal notation, invariants, or equations central to the
      concept. For example, for semaphores write the P and V operations
      using proper notation on a SINGLE line each — NOT inside LaTeX
      display-math \[ ... \] blocks (these break spacing in Markdown).
      Use a plain fenced code block instead:
      P(S): S := S - 1   (block process if S < 0 after decrement)
      V(S): S := S + 1   (wake one waiting process if S <= 0 before increment)
      Or use inline code: `P(S) = S - 1` for short expressions inline.

    P4 — HISTORICAL CONTEXT
      Identify who introduced the concept, when, and the original problem
      it solved. Describe how the concept evolved to its modern form.
      Cite the foundational source [N].

    P5 — REAL-WORLD APPLICATIONS
      Name 3–4 specific production systems or standards that rely on this
      concept (e.g. Linux kernel, POSIX standard, Java JVM, database engines).
      For each, give one concrete detail about how it is used.

    P6 — CONTRAST WITH RELATED CONCEPT
      Compare with the nearest alternative (e.g. semaphore vs mutex,
      fork vs thread, BFS vs DFS). Show precisely where they differ in
      behaviour, overhead, and appropriate use cases. Cite [N].

    BANNED phrases (instant fail if any appear):
      "It is worth noting" | "It should be noted" | "It is important to"
      "In today's world" | "In the realm of" | "Furthermore" | "Moreover"
      "Additionally" | "Delve into" | "Leverage" | "Firstly/Secondly"
      "As we can see" | "Clearly," | "Obviously," | "Simply put,"

    MANDATORY: Cite at least 2 of CITATIONS[1..5] inline as [1], [2], etc.
    Place citations at the end of the sentence they support, before the period.

    ---

    ══════════════════════════════════════════════════════════════════════
    SECTION 3 — METHODOLOGY
    ══════════════════════════════════════════════════════════════════════

    ## 3. Methodology

    Write exactly 7 numbered steps. Each step uses this rigid structure:

      N. **[Concise step title]**
         WHAT: [1–2 sentences stating the action taken.]
         WHY:  [1–2 sentences justifying the engineering decision.]

    Cover these seven topics in order:
      1. Execution environment — OS name + version, CPU architecture
      2. Language & toolchain — compiler/interpreter, version, compilation flags
      3. Library selection — which libraries and why those specifically
      4. Algorithm / design approach — key design decision and its rationale
      5. Input / parameter configuration — how test parameters were chosen
      6. Testing and edge-case strategy — what edge cases were tested and why
      7. Output validation approach — how correctness was confirmed

    ---

    ══════════════════════════════════════════════════════════════════════
    SECTION 4 — IMPLEMENTATION
    ══════════════════════════════════════════════════════════════════════

    ## 4. Implementation

    4A. DESIGN OVERVIEW (1 paragraph, 4–6 sentences)
      Describe the overall architecture: major components, their
      responsibilities, and how they interact. Name every significant
      function or class. Do not describe line numbers.

    4B. SOURCE CODE
      Insert FULL_CODE verbatim inside a fenced code block with the
      correct language tag. The code must be byte-perfect — no
      truncation, no paraphrase, no ellipsis ("..."), no "[rest of code]".
      
      Example format:
      
      ```python
      [FULL_CODE — inserted exactly as extracted in Phase 1]
      ```

    4C. ### Code Walkthrough
      Walk through the code in logical blocks, NOT line by line.
      For each logical block write 2–4 sentences:
        — what the block does
        — why it is structured that way
        — any non-obvious design choice
      One paragraph per distinct logical block.
      Minimum 4 walkthrough paragraphs; maximum 8.

    ---

    ══════════════════════════════════════════════════════════════════════
    SECTION 5 — RESULTS AND ANALYSIS
    ══════════════════════════════════════════════════════════════════════

    ## 5. Results and Analysis

    5A. CONTEXT SENTENCE
      One sentence naming: OS, hardware, and date of execution.

    5B. RAW OUTPUT
      Insert FULL_OUTPUT verbatim in a plain code fence (no language tag).
      Place exactly one blank line before the opening ``` and exactly one
      blank line after the closing ```. No extra lines inside the fence.
      
      Example format:
      
      (blank line here)
      ```
      [FULL_OUTPUT — inserted exactly as extracted in Phase 1]
      ```
      (blank line here)
      
    5C. INLINE CHARTS
      If DataVizTool returned image markdown, insert each image reference
      on its own line immediately after the code fence.

    5D. ANALYSIS PARAGRAPHS (4–5 paragraphs)
      Para 1: Walk through the output section by section — what each
              portion proves about the program's behaviour.
      Para 2: Verify against theoretical expectations from Section 2.
              Quote or reference a specific line of FULL_OUTPUT as evidence.
      Para 3: Interpret specific numeric values (times, counts, sizes).
              Explain why each value is or is not within expected bounds.
      Para 4: If measurable data exists, present it as a Markdown table
              with a caption. Columns must align; no ragged pipes.
      Para 5 (optional): Note any anomalous or unexpected result and
              provide a technically grounded explanation.

    BANNED: "Output will vary" | "Results may differ" | "Sample output"
           "[output here]" | "as shown above" | any hypothetical phrasing

    ---

    ══════════════════════════════════════════════════════════════════════
    SECTION 6 — DISCUSSION
    ══════════════════════════════════════════════════════════════════════

    ## 6. Discussion

    Write exactly 4 paragraphs. No bullet points. No sub-headings.

      D1 — THEORY ALIGNMENT
           Compare results against the theoretical model in Section 2.
           State concretely whether they agree or diverge, and why.
           Reference a specific value or line from FULL_OUTPUT.

      D2 — EDGE CASES & FAILURE MODES
           Identify 2–3 boundary conditions relevant to this implementation
           (e.g. empty buffer, zero threads, integer overflow, starvation).
           For each, describe the expected failure and how to mitigate it.

      D3 — LIMITATIONS & SCALABILITY
           State what assumptions the implementation makes.
           Identify at least one aspect that does not scale or generalise.
           Use concrete terms (e.g. "assumes a single-machine shared-memory
           model; distributed scenarios require a different primitive").

      D4 — PRODUCTION RELEVANCE
           Connect this experiment to a real-world system or industry
           practice. Name the system. Be specific about the connection.
           Cite one of CITATIONS[1..5].

    ---

    ══════════════════════════════════════════════════════════════════════
    SECTION 7 — CONCLUSION
    ══════════════════════════════════════════════════════════════════════

    ## 7. Conclusion

    Write exactly 4 sentences. No more, no less.
      S1: What was implemented and demonstrated (past tense, specific).
      S2: The single most significant finding from FULL_OUTPUT.
      S3: One concrete, technically specific direction for future work.
          BAD: "future work could explore more advanced scenarios."
          GOOD: "Replacing binary semaphores with a priority-inheritance
                mutex would eliminate the priority-inversion anomaly
                observed when three high-priority consumers starved."
      S4: One sentence on broader practical relevance.

    BANNED openers: "In conclusion," | "To summarise," | "Overall,"
    "In summary," | "As shown," | "This report has shown"

    ---

    ══════════════════════════════════════════════════════════════════════
    SECTION 8 — REFERENCES
    ══════════════════════════════════════════════════════════════════════

    ## 8. References

    List CITATIONS[1..5] in IEEE format, ordered by first appearance
    in the document (not alphabetically). Use these exact templates:

    Journal article:
      [N] A. A. Author and B. B. Author, "Title of article," *Abbrev.
          Journal Name*, vol. X, no. Y, pp. ZZZ–ZZZ, Mon. YYYY,
          doi: 10.XXXX/XXXXX.

    Book:
      [N] A. A. Author, *Book Title*, Nth ed. City, Country:
          Publisher, YYYY, pp. ZZZ–ZZZ.

    Conference paper:
      [N] A. A. Author, "Title," in *Proc. Full Conf. Name (ABBR)*,
          City, Country, YYYY, pp. ZZZ–ZZZ, doi: 10.XXXX/XXXXX.

    Online standard / RFC (only when no print version exists):
      [N] Standard Body, *Standard Title*, Standard No., Mon. YYYY.
          [Online]. Available: https://... [Accessed: DD Mon. YYYY].

    VERIFICATION RULE: Every [N] cited inline must appear here.
    Every entry here must be cited at least once in the body.
    No orphan references. No orphan inline citations.

    ══════════════════════════════════════════════════════════════════════
    GLOBAL WRITING STANDARDS — apply to every character of output
    ══════════════════════════════════════════════════════════════════════

    TYPOGRAPHY & MATH RULES:
      - NO LaTeX display-math blocks \[ ... \] anywhere in the document.
        These create extra blank lines and broken spacing in Markdown.
        Use instead:
        (a) inline code backticks for short expressions: `P(S) = S - 1`
        (b) fenced code blocks (``` ... ```) for multi-line equations
      - Inline code (`backticks`) for: variable names, function names,
        file names, flags, OS commands, and short math expressions.
      - Bold (**text**) only for: table column headers, step titles in
        Section 3, and the first introduction of a defined technical term.
      - No emojis. No decorative Unicode. Horizontal rules (---) only
        between major sections, never within a section.

    SPACING & ALIGNMENT:
      - One blank line between paragraphs. Never two or more blank lines.
      - No trailing spaces on any line.
      - Markdown tables: always include a header row; align column pipes
        consistently; use :--- for left, :---: for centre, ---: for right.
      - Code fences: the opening ``` is on its own line; the closing ``` is
        on its own line; exactly one blank line before and one after the
        entire fence block; no extra blank lines inside the fence.

    FORBIDDEN PHRASES — auto-fail if any of these appear anywhere:
      "It is worth noting" | "It should be noted" | "It is important to"
      "This experiment aims" | "The purpose of this lab" | "Delve into"
      "In today's fast-paced" | "In the realm of" | "Leverage" (as verb)
      "Furthermore" | "Moreover" | "Additionally" | "In conclusion"
      "To summarise" | "Firstly/Secondly/Thirdly" | "Needless to say"
      "[placeholder]" | "[output here]" | "[code here]" | "SKIPPED"
      "will be shown" | "would demonstrate" | "As we can see" | "Clearly,"
      "Obviously," | "Simply put," | "Output will vary" | "Sample output"

    WORD COUNT:
      Minimum 1,800 words of prose.
      Code blocks and FULL_OUTPUT are excluded from this count.

    FINAL QUALITY GATE — verify every checkbox before outputting:
      [ ] FULL_CODE appears verbatim and complete in Section 4
      [ ] FULL_OUTPUT appears verbatim and complete in Section 5
      [ ] Zero LaTeX \[ ... \] display-math blocks anywhere in document
      [ ] Zero double blank lines anywhere in the document
      [ ] Zero forbidden phrases
      [ ] Zero placeholders of any kind
      [ ] 4–5 real IEEE references, every field verifiable
      [ ] Section 2 has exactly 6 prose paragraphs, zero bullet points
      [ ] Section 3 has exactly 7 numbered WHAT+WHY steps
      [ ] Section 6 has exactly 4 paragraphs, zero bullet points
      [ ] Section 7 has exactly 4 sentences
      [ ] Every [N] in body has a matching entry in Section 8
      [ ] Every entry in Section 8 is cited at least once in the body
      [ ] Minimum 1,800 prose words (excluding code and output blocks)

  expected_output: >
    A submission-ready academic lab report in Markdown. All 8 sections
    present, complete, and free of placeholder text. FULL_CODE appears
    verbatim in Section 4. FULL_OUTPUT appears verbatim in Section 5.
    Section 2 contains exactly 6 graduate-level textbook paragraphs with
    zero bullet points and zero LaTeX display-math blocks. Section 8 lists
    4–5 real, fully-populated IEEE citations. The document contains zero
    forbidden phrases, zero extra blank lines, zero emojis, and a minimum
    of 1,800 words of prose outside code and output blocks.

  agent: Elite_Academic_Document_Architect