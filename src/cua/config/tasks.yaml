video_download_task:
  description: >
    Read the routing directives first.
    If selected_workflow is YOUTUBE_NOTES, use the YouTubeMediaAssistant tool to process
    this exact URL: {youtube_url}. Return a high-fidelity transcript with accurate timestamps.
    If selected_workflow is not YOUTUBE_NOTES, return SKIPPED: Not a YouTube workflow.
  expected_output: >
    A complete transcript with timestamps, or SKIPPED message for non-YouTube workflows.
  agent: YouTubeMediaAssistant

planner_agent_task:
  description: >
    Create a short execution plan based on user_input {user_input}, routing mode {task_type},
    topic {topic}, and youtube_url {youtube_url}.
    Planning objective: {planner_goal}
    The plan must include workflow selection rationale, tool execution sequence, and output format.
  expected_output: >
    A concise workflow plan with clear steps that downstream tasks can follow.
  agent: PlannerAgent

routing_decision_task:
  description: >
    Using user_input {user_input}, task_type {task_type} (AUTO mode), and the planner plan,
    produce explicit routing directives for downstream tasks.
    If user_input describes a programming task, set selected_workflow to CODE_EXECUTION.
    Return a compact routing block with selected_workflow (YOUTUBE_NOTES, GENERAL_QUERY,
    CODE_EXECUTION, NUMERICAL_METHODS, or LAB_REPORT), tools_to_use list,
    should_upload_to_notion flag, and notes_format specification.
  expected_output: >
    A deterministic routing directive with selected_workflow, tools_to_use list,
    should_upload_to_notion boolean, and notes_format string.
  agent: PlannerAgent

code_execution_task:
  description: >
    You are a senior software engineer. Your job is to write AND execute code.

    Analyze user_input: {user_input}

    If this is a programming task (CODE_EXECUTION or GENERAL_QUERY with code request):

    STEP 1 - WRITE THE CODE:
    Write complete, working, well-commented Python code that fully solves the problem.
    Rules for the code:
    - Replace any input() calls with hardcoded sample values (e.g., num_threads = 3)
    - The code must run without any user interaction
    - Include all imports
    - Add clear comments explaining each section
    - For threading/semaphore tasks, use num_threads = 3 as the default sample value

    STEP 2 - EXECUTE THE CODE:
    Use the CodeCompilerTool with the exact code you wrote and language="python".
    The tool will return the actual stdout output.

    STEP 3 - RETURN BOTH:
    Return in this exact format:

    CODE:
    ```python
    [paste your complete code here]
    ```

    OUTPUT:
    ```
    [paste the exact stdout from CodeCompilerTool here]
    ```

    If the user requests visual graphs, charts, or plots, use the DataVizTool instead
    of CodeCompilerTool. Ensure the markdown output from DataVizTool is included
    so the final report can display the images.

    If not a programming task, return: SKIPPED: No code execution required.
  expected_output: >
    The complete Python code in a fenced code block, followed by the actual execution
    output in a separate output block. Both sections must be present and populated.
  agent: CoderAgent

lab_report_generation_task:
  description: >
    Read routing directives first.
    If selected_workflow is LAB_REPORT, use LabReportGenerator tool to extract content
    from the lab manual file at {lab_manual_path}.
    Parse the extracted content to identify title, objective, theory, and procedure.
    If theory is incomplete, use search_tool to find additional information.
    Convert algorithm to Octave code and execute using OctaveOnline tool.
    Compile everything into a professional lab report.
    If selected_workflow is not LAB_REPORT, return SKIPPED: Not a lab report workflow.
  expected_output: >
    A complete professional lab report in markdown format, or SKIPPED for non-lab workflows.
  agent: LabReportGeneratorAgent

numerical_methods_task:
  description: >
    Read routing directives first.
    If selected_workflow is NUMERICAL_METHODS, solve the requested numerical problem.
    Use OctaveOnline tool to execute Octave/MATLAB code and include execution output.
    Return a lab-style report with problem statement, method, code, output, and interpretation.
    If selected_workflow is not NUMERICAL_METHODS, return SKIPPED: Not a numerical methods workflow.
  expected_output: >
    A numerical methods lab report with code and execution output, or SKIPPED message.
  agent: NumericalMethodsAgent

notes_creation_task:
  description: >
    You are a senior academic writer with 20+ years of experience producing
    graduate-level lab reports. Your output must be indistinguishable from
    the work of a meticulous human student. Read every instruction below
    before writing a single word.

    ═══════════════════════════════════════════════════════
    PHASE 1 — DATA EXTRACTION (do this FIRST, before writing)
    ═══════════════════════════════════════════════════════

    From code_execution_task context, extract and store:
      A) FULL_CODE      — the complete, unmodified source code
      B) FULL_OUTPUT    — the complete terminal/console output, verbatim
      C) EXPERIMENT_TOPIC — the subject (e.g., "semaphore-based mutual exclusion")

    If either A or B is missing, STOP and report the missing data.
    Do NOT proceed with placeholders. Never fabricate output.

    ═══════════════════════════════════════════════════════
    PHASE 2 — CITATION RETRIEVAL
    ═══════════════════════════════════════════════════════

    Call CitationFinder with EXPERIMENT_TOPIC as the query.
    Retrieve exactly 4–5 real, verifiable academic sources.
    Store them as CITATIONS.

    Do NOT fabricate titles, authors, journal names, DOIs, or years.
    If CitationFinder returns fewer than 4 results, call it again
    with a broader query variant. Never guess or hallucinate references.

    ═══════════════════════════════════════════════════════
    PHASE 3 — WRITE THE REPORT
    ═══════════════════════════════════════════════════════

    Use memory_context {memory_context} for any student/course details.
    Write every section in full. Output the complete Markdown document.

    ─────────────────────────────────────────────────────
    DOCUMENT HEADER
    ─────────────────────────────────────────────────────

    # [Descriptive Experiment Title — inferred from EXPERIMENT_TOPIC]

    | Field       | Value                                      |
    |-------------|--------------------------------------------|
    | University  | [University Name from memory_context]      |
    | Course      | [Course Name and Code from memory_context] |
    | Experiment  | [Experiment Title]                         |
    | Student     | [Student Name from memory_context]         |
    | Date        | [Today's date, formatted: DD Month YYYY]   |
    | Instructor  | [Instructor Name from memory_context]      |

    ---

    ─────────────────────────────────────────────────────
    TABLE OF CONTENTS
    ─────────────────────────────────────────────────────

    ## Table of Contents

    1. Objective
    2. Theory and Background
    3. Methodology
    4. Implementation
    5. Results and Analysis
    6. Discussion
    7. Conclusion
    8. References

    ---

    ─────────────────────────────────────────────────────
    SECTION 1 — OBJECTIVE
    ─────────────────────────────────────────────────────

    ## 1. Objective

    REQUIREMENTS:
    - Exactly 2–3 sentences.
    - State what was implemented, what was demonstrated, and what is measured.
    - Be specific: name the algorithm, data structure, OS primitive, or concept.
    - Do NOT use filler phrases: "The aim of this experiment is to..."
      "This lab seeks to..." — these are forbidden.
    - Example of acceptable tone:
      "This experiment implements a bounded-buffer producer-consumer system
      using POSIX semaphores to demonstrate mutual exclusion and process
      synchronisation in a multi-threaded Linux environment."

    ---

    ─────────────────────────────────────────────────────
    SECTION 2 — THEORY AND BACKGROUND
    ─────────────────────────────────────────────────────

    ## 2. Theory and Background

    REQUIREMENTS:
    - Minimum 5 substantial paragraphs. No bullet points anywhere in this section.
    - Write in the style of an undergraduate operating systems or algorithms
      textbook — authoritative, clear, flowing prose.
    - Each paragraph must cover one of these angles (adapt to the topic):
        P1: Core definition — formal, precise. Include etymology if meaningful.
        P2: Mechanism — how it operates internally at the OS/hardware/algorithm level.
        P3: Mathematical or logical foundations — include formal notation, equations,
            or pseudocode where the concept has quantifiable properties.
        P4: Historical context or evolution — who introduced it, when, and why.
        P5: Real-world applications — where this is used in production systems today.
        P6 (optional): Comparison with a related concept — distinguish clearly.
    - Never use these phrases (they signal AI text):
        "It is worth noting that", "It should be noted", "It is important to",
        "This experiment aims to", "Delve into", "In today's world",
        "In the realm of", "Furthermore,", "Moreover,", "Additionally,",
        "In conclusion,", "To summarise,", "Firstly,", "Secondly,".
    - Vary sentence length: mix short declarative sentences with complex ones.
    - Use active voice preferentially. Passive voice is acceptable for describing
      established facts or system behaviours, not as a default.
    - Cite at least 2 of your CITATIONS inline using IEEE numbered format [1].

    ---

    ─────────────────────────────────────────────────────
    SECTION 3 — METHODOLOGY
    ─────────────────────────────────────────────────────

    ## 3. Methodology

    REQUIREMENTS:
    - Use a numbered list of steps (1, 2, 3...).
    - Each step must contain two parts:
        WHAT was done + WHY that decision was made.
    - Cover all of: environment setup, language/library selection rationale,
      algorithm or design decisions, testing strategy, validation approach.
    - Minimum 6 steps. Each step is 2–4 sentences.
    - Be specific: name the OS, compiler/interpreter version, library versions,
      and any relevant flags or parameters used.
    - Do not simply describe the code — describe the engineering decisions
      made before and during implementation.

    ---

    ─────────────────────────────────────────────────────
    SECTION 4 — IMPLEMENTATION
    ─────────────────────────────────────────────────────

    ## 4. Implementation

    REQUIREMENTS:
    - Open with 1 paragraph (3–5 sentences) summarising the design:
      overall architecture, major components, and key decisions.
    - Then insert FULL_CODE exactly as extracted, inside a fenced code block
      with the correct language identifier (triple backticks with language name).
      Example: ```python followed by code, then closing triple backticks.
      [FULL_CODE here — unmodified, complete, nothing omitted]
    - After the code block, add a "Code Walkthrough" subsection using
      ### Code Walkthrough
      Walk through each logical section of the code with 1–3 sentences per section.
      Do not repeat line numbers; describe what each block accomplishes and why
      it is structured that way.
    - Never summarise, abbreviate, or paraphrase the code. It must be complete.
    - Never write "[code here]", "[see above]", or any other placeholder.

    ---

    ─────────────────────────────────────────────────────
    SECTION 5 — RESULTS AND ANALYSIS
    ─────────────────────────────────────────────────────

    ## 5. Results and Analysis

    REQUIREMENTS:
    - Open with 1 sentence contextualising the execution environment
      (OS, hardware, date/time if relevant).
    - Insert FULL_OUTPUT exactly as extracted, inside a fenced code block
      (triple backticks without language identifier for raw terminal output).
      [FULL_OUTPUT here — verbatim, unmodified, complete]
    - If DataVizTool returned any markdown image references or chart embeds,
      insert them directly after the output block so they render inline.
    - After the output block, write 3–5 paragraphs of analysis:
        - What does each part of the output demonstrate?
        - Does the output confirm theoretical expectations? Cite Section 2.
        - Identify any specific values, timings, or counts in the output
          and explain their significance.
    - If the output contains measurable data (times, counts, sizes), include
      a comparison or summary table in Markdown format.
    - Never write "Output will vary", "Results may differ", "Sample output",
      or any phrase suggesting the output is hypothetical.
    - Never write "[output here]" or any other placeholder.

    ---

    ─────────────────────────────────────────────────────
    SECTION 6 — DISCUSSION
    ─────────────────────────────────────────────────────

    ## 6. Discussion

    REQUIREMENTS:
    - Exactly 3–4 paragraphs. No bullet points.
    - Paragraph 1: Interpret the results in relation to the theory from Section 2.
      Were the results consistent with expectations? If not, explain why.
    - Paragraph 2: Discuss edge cases, failure modes, or boundary conditions
      that were encountered or could realistically occur. Be specific.
    - Paragraph 3: Limitations of the current implementation — what assumptions
      were made? What does not scale or generalise?
    - Paragraph 4 (optional): How does this experiment connect to production
      systems or broader OS/software engineering principles?
    - This section must reference at least one specific line or value from
      the actual output (FULL_OUTPUT). Do not discuss results in the abstract.
    - Maintain critical academic tone — do not be purely celebratory.

    ---

    ─────────────────────────────────────────────────────
    SECTION 7 — CONCLUSION
    ─────────────────────────────────────────────────────

    ## 7. Conclusion

    REQUIREMENTS:
    - Exactly 3–4 sentences.
    - Sentence 1: State what was successfully implemented and demonstrated.
    - Sentence 2: Summarise the most important finding from the results.
    - Sentence 3: Suggest one concrete, technically specific direction for
      future work (not "this could be extended to do more things").
    - Sentence 4 (optional): A closing reflection on the practical relevance.
    - Do NOT use: "In conclusion,", "To summarise,", "Overall,", "In summary,".
    - Do NOT introduce new technical concepts not discussed earlier.

    ---

    ─────────────────────────────────────────────────────
    SECTION 8 — REFERENCES
    ─────────────────────────────────────────────────────

    ## 8. References

    REQUIREMENTS:
    - List all 4–5 entries from CITATIONS in strict IEEE format:
        [1] A. Author and B. Author, "Title of Paper," *Journal Name*,
            vol. X, no. Y, pp. ZZZ–ZZZ, Month YYYY. doi: 10.XXXX/XXXXX
        [2] A. Author, *Book Title*, Nth ed. City, Country: Publisher, YYYY.
        [3] A. Author, "Title," in *Proc. Conf. Name*, City, Country, YYYY,
            pp. ZZZ–ZZZ.
    - Every field (authors, title, venue, year) must be real and verifiable.
    - Each reference cited inline in Sections 2 and 6 must appear here.
    - Order references by first appearance in the document, not alphabetically.
    - No URLs unless the source is a web-only resource (RFC, standard, online doc).
      If a URL is included, add [Accessed: DD Month YYYY].

    ---

    ═══════════════════════════════════════════════════════
    GLOBAL WRITING RULES — apply to every section
    ═══════════════════════════════════════════════════════

    FORBIDDEN PHRASES (auto-fail if any appear):
      - "It is worth noting"       - "It should be noted"
      - "This experiment aims to"  - "The purpose of this lab"
      - "In today's fast-paced"    - "In the realm of"
      - "Delve into"               - "Leverage" (as a verb)
      - "Furthermore"              - "Moreover"
      - "Additionally"             - "In conclusion"
      - "To summarise"             - "Firstly / Secondly / Thirdly"
      - "It is important to note"  - "Needless to say"
      - "[placeholder]"            - "[output here]"
      - "[code here]"              - "SKIPPED"
      - "will be shown"            - "would demonstrate"
      - "As we can see"            - "Clearly,"
      - "Obviously,"               - "Simply put,"

    FORMATTING RULES:
      - No emojis anywhere in the document.
      - Section headings use ## (H2). Sub-headings use ### (H3).
      - Bold (**text**) only for labels in tables or to highlight a defined
        technical term on first use. Not for emphasis in prose.
      - Inline code (`backticks`) for: variable names, function names,
        file names, command-line arguments.
      - All code blocks must have a language identifier (```c, ```python, etc.)
        except raw terminal output (use plain ``` for that).
      - Minimum total word count: 1,500 words (excluding code blocks and output).

    QUALITY GATE — before finalising output, verify:
      [ ] FULL_CODE appears verbatim in Section 4
      [ ] FULL_OUTPUT appears verbatim in Section 5
      [ ] Zero forbidden phrases present
      [ ] Zero placeholders of any kind
      [ ] 4–5 real references in IEEE format in Section 8
      [ ] Minimum 5 prose paragraphs in Section 2
      [ ] Minimum 1,500 words outside of code/output blocks
      [ ] Every inline citation [N] has a matching entry in Section 8

  expected_output: >
    A complete, polished academic lab report in Markdown, minimum 1,500 words
    of prose (code blocks and program output excluded from word count).
    All 8 sections are present and fully written — no section is skipped,
    abbreviated, or contains placeholder text of any kind.
    Section 4 contains the verbatim source code from code_execution_task.
    Section 5 contains the verbatim program output from code_execution_task.
    Section 2 reads like a graduate-level textbook passage with a minimum of
    five paragraphs and zero bullet points.
    Section 8 contains 4–5 real, IEEE-formatted citations retrieved via
    CitationFinder — no fabricated or hallucinated references.
    The document contains zero forbidden phrases, zero emojis, and zero
    placeholder text.

  agent: Elite_Academic_Document_Architect