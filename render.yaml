services:
  - type: web
    name: academix-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 8000
      - key: PYTHONPATH
        value: /app/src:/app
      # Optional: set a Webshare proxy URL to bypass YouTube's cloud IP block
      # Format: http://user:pass@proxy-host:port  (get free proxies at webshare.io)
      # - key: WEBSHARE_PROXY_URL
      #   value: http://username:password@proxy.webshare.io:80
    healthCheckPath: /api/health
